<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tasks | StudySync Pro</title>

<link rel="stylesheet" href="css/tasks.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/toast.css">
<link rel="stylesheet" href="css/ui-polish.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar"></aside>

    <!-- Main Content -->

    <main class="main-content">

        <h1>📋 Task Manager</h1>
        

        <p class="subtitle">
            Organize, prioritize and complete your work efficiently.
        </p>

        <!-- Statistics -->

        <div class="task-stats">

            <div class="stat-box">
                <h2 id="totalTasks">0</h2>
                <p>Total Tasks</p>
            </div>

            <div class="stat-box">
                <h2 id="completedTasks">0</h2>
                <p>Completed</p>
            </div>

            <div class="stat-box">
                <h2 id="pendingTasks">0</h2>
                <p>Pending</p>
            </div>

        </div>

        <!-- Add Task -->

        <div class="task-form">

            <input
                type="text"
                id="taskName"
                placeholder="Task Name">

            <select id="taskPriority">

                <option>High</option>
                <option>Medium</option>
                <option>Low</option>

            </select>

            <select id="taskCategory">

                <option>Study</option>
                <option>Assignment</option>
                <option>Exam</option>
            </select>

            <button id="addTask">
                <i class="fa-solid fa-plus"></i>
                Add Task
            </button>
            
            </div>
            
            <!-- Search -->
            
            <div class="search-box">
            
                <input
                    type="text"
                    id="searchTask"
                    placeholder="Search Tasks...">
            
            </div>
            
            <!-- Task List -->
            
            <div id="taskList" class="task-list">
            
            </div>
            
            </main>
            
            </div>
            <script type="module" src="js/auth.js"></script>
            <script type="module" src="js/theme.js"></script>
            <script type="module" src="js/logout.js"></script>
            <script type="module" src="js/tasks.js"></script>
            <script type="module" src="js/sidebar.js"></script>
            <script src="js/toast.js"></script>
            
            </body>
            
            </html>
