<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudySync Pro | Assignments</title>

<link rel="stylesheet" href="css/assignments.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/toast.css">
<link rel="stylesheet" href="css/ui-polish.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <aside class="sidebar"></aside>

<main class="main-content">

<h1>📝 Assignments</h1>
<div class="search-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input
        type="text"
        id="assignmentSearch"
        placeholder="Search assignments...">
</div>

<p class="subtitle">
Manage your assignments and deadlines.
</p>

<div class="assignment-form">

<input type="text"
id="assignmentTitle"
placeholder="Assignment Title">

<input type="text"
id="assignmentSubject"
placeholder="Subject">

<input type="date"
id="assignmentDate">

<select id="assignmentPriority">

<option>High</option>
<option>Medium</option>
<option>Low</option>

</select>

<button id="addAssignment">
Add Assignment
</button>

</div>

<div class="assignment-list">

<h2>📋 Assignment List</h2>

<div id="assignmentContainer">

<p>No assignments added yet.</p>

</div>

</div>

</main>

</div>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/theme.js"></script>
<script type="module" src="js/logout.js"></script>
<script type="module" src="js/assignments.js"></script>
<script type="module" src="js/sidebar.js"></script>
<script src="js/toast.js"></script>


</body>
</html>
